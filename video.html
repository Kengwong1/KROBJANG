<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>หมวดวิดีโอ - ครบจังดอทคอม</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2068902667667616" crossorigin="anonymous"></script>
<style>
:root{--primary-dark:#1e3a8a;--primary:#1e40af;--soft:#eff6ff;--bg:#f8fafc;--card:#fff;--text:#1e293b;--muted:#64748b;--radius:18px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}

header{background:linear-gradient(135deg,var(--primary-dark),var(--primary));color:#fff;padding:0.75rem 1rem;box-shadow:0 2px 12px rgba(30,64,175,0.3);position:sticky;top:0;z-index:1000;display:flex;justify-content:center;align-items:center;}
header h1{margin:0;font-size:1.4rem;font-weight:800;}
.live-badge{position:absolute;right:1rem;top:50%;transform:translateY(-50%);background:#ef4444;color:#fff;font-size:0.72rem;font-weight:700;padding:3px 10px;border-radius:20px;display:flex;align-items:center;gap:5px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}

.main-nav{background:#fff;padding:0.5rem 0;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.nav-wrap{max-width:1200px;margin:auto;display:flex;gap:0.5rem;padding:0 1rem;overflow-x:auto;white-space:nowrap;scrollbar-width:none;}
.nav-wrap::-webkit-scrollbar{display:none;}
.main-nav a{text-decoration:none;color:#4b5563;font-weight:600;padding:0.6rem 1rem;border-radius:12px;transition:all 0.2s;display:flex;align-items:center;gap:0.4rem;font-size:0.95rem;}
.main-nav a:hover,.main-nav a.active{background:var(--soft);color:var(--primary);}

.container{max-width:1200px;margin:1.5rem auto;padding:0 1rem;display:grid;grid-template-columns:1fr 300px;gap:1.5rem;}
.content-area{display:flex;flex-direction:column;gap:1.5rem;}

.section{background:var(--card);border-radius:var(--radius);padding:1.25rem;box-shadow:0 4px 12px rgba(30,64,175,0.04);}
.sec-title{font-size:1.2rem;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:0.5rem;margin-bottom:1rem;}
.sec-title::before{content:"";width:8px;height:8px;background:var(--primary);border-radius:50%;display:inline-block;}

/* TABS */
.ch-tabs{display:flex;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap;}
.ch-tab{padding:0.4rem 1rem;border-radius:20px;border:2px solid #e2e8f0;background:#fff;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:0.82rem;font-weight:600;color:var(--muted);transition:all 0.2s;}
.ch-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.ch-tab:hover:not(.active){border-color:#93c5fd;color:var(--primary);}

/* VIDEO GRID */
.vid-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;}
.vid-card{border-radius:14px;overflow:hidden;background:var(--card);border:2px solid #f1f5f9;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s;display:flex;flex-direction:column;}
.vid-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(30,64,175,0.12);border-color:#93c5fd;}
.vid-thumb{position:relative;padding-bottom:56.25%;overflow:hidden;background:#0f172a;}
.vid-thumb img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:block;}
.vid-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.18);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;}
.vid-card:hover .vid-overlay{opacity:1;}
.vid-play-btn{width:52px;height:52px;border-radius:50%;background:rgba(239,68,68,0.92);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.1rem;padding-left:4px;box-shadow:0 4px 16px rgba(0,0,0,0.4);}
.vid-ch-badge{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,0.78);color:#fff;font-size:0.68rem;font-weight:700;padding:3px 8px;border-radius:6px;}
.vid-body{padding:0.75rem;flex:1;}
.vid-title{font-size:0.88rem;font-weight:700;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.vid-date{font-size:0.75rem;color:#94a3b8;margin-top:0.3rem;}

/* SKELETON */
.skel{border-radius:14px;overflow:hidden;background:#fff;border:2px solid #f1f5f9;}
.skel-img{padding-bottom:56.25%;background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
.skel-body{padding:0.75rem;}
.skel-line{height:12px;border-radius:6px;margin-bottom:0.5rem;background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
.skel-line.s{width:55%;margin-bottom:0;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* ERROR BANNER */
.err-banner{background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:1rem;color:#dc2626;font-size:0.88rem;display:flex;align-items:center;gap:0.5rem;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:9999;display:none;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex;}
.modal-box{width:100%;max-width:900px;background:#000;border-radius:16px;overflow:hidden;position:relative;}
.modal-close{position:absolute;top:10px;right:12px;background:rgba(255,255,255,0.18);border:none;color:#fff;font-size:1.2rem;cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:10;transition:background 0.2s;}
.modal-close:hover{background:rgba(255,255,255,0.35);}
.modal-player{position:relative;padding-bottom:56.25%;}
.modal-player iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;gap:1.25rem;}
.ad-section{background:var(--card);border-radius:var(--radius);padding:1rem;box-shadow:0 4px 12px rgba(30,64,175,0.04);text-align:center;}
.ad-section h2{font-size:1.1rem;margin-bottom:0.75rem;color:#1e293b;font-weight:700;display:flex;justify-content:center;align-items:center;gap:0.5rem;padding-bottom:0.6rem;border-bottom:2px solid #f1f5f9;}
.ad-section h2.support-site i{color:#7E57C2;}
.ad-section h2.support-us i{color:#FB8C00;}
.adsense-outer{position:relative;min-height:250px;background:#f9fbff;border:1px dashed #dbeafe;border-radius:12px;overflow:hidden;margin-bottom:0.5rem;}
.adsense-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.5rem;color:#93c5fd;font-size:0.82rem;z-index:0;pointer-events:none;}
.adsense-outer ins{position:relative;z-index:1;}
.qr-code{width:100%;max-width:140px;height:auto;margin:0.75rem auto;display:block;border-radius:8px;}
.support-links{display:grid;grid-template-columns:repeat(2,1fr);gap:0.65rem;margin-top:0.75rem;}
.support-btn{display:flex;align-items:center;justify-content:center;gap:0.45rem;padding:0.6rem 0.4rem;border-radius:10px;text-decoration:none;font-weight:700;font-size:0.85rem;color:white;transition:all 0.2s;}
.support-btn:hover{transform:translateY(-2px);}
.support-btn.facebook{background:#4267B2;}.support-btn.youtube{background:#FF0000;}.support-btn.tiktok{background:#000;}.support-btn.promptpay{background:#10B981;}

footer{margin-top:2rem;background:linear-gradient(135deg,var(--primary-dark),var(--primary));color:white;text-align:center;padding:1.25rem 1rem;font-size:0.9rem;}
footer a{color:#e0f2fe;text-decoration:none;font-weight:600;margin:0 0.5rem;}
@media(max-width:900px){.container{grid-template-columns:1fr;padding:0 0.75rem;}.vid-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:480px){.vid-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

      <iframe id="modalIframe" src="" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>

<nav class="main-nav">

<script>
/*
  video.html ดึงวิดีโอจาก /api/videos?cat=xxx
  ซึ่ง Vercel cache ไว้ 6 ชม. → คนดูกี่หมื่นก็ไม่กิน quota
*/

// Section definitions (ไม่มี channel ID ที่นี่ — อยู่ใน /api/videos.js)
const SECTIONS = [
  { cat:'news',      icon:'fas fa-newspaper', title:'วิดีโอข่าว' },
  { cat:'entertain', icon:'fas fa-star',       title:'วิดีโอบันเทิง' },
  { cat:'sport',     icon:'fas fa-futbol',     title:'วิดีโอกีฬา' },
  { cat:'tech',      icon:'fas fa-microchip',  title:'เทคโนโลยี & AI' },
  { cat:'cartoon',   icon:'fas fa-film',       title:'การ์ตูนและแอนิเมชัน' },
  { cat:'game',      icon:'fas fa-gamepad',    title:'วิดีโอเกม' },
];

// ── Modal ──
const overlay = document.getElementById('modalOverlay');
const iframe  = document.getElementById('modalIframe');
document.getElementById('modalClose').onclick = closeModal;
overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

function openModal(id){
  iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(){
  iframe.src = '';
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

// ── Skeleton ──
function skeletons(n=6){
  return `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;">
    ${Array(n).fill(`
      <div class="skel">
        <div class="skel-img"></div>
        <div class="skel-body">
          <div class="skel-line"></div>
          <div class="skel-line s"></div>
        </div>
      </div>`).join('')}
  </div>`;
}

// ── Relative time ──
function relTime(iso){
  if(!iso) return '';
  const s = (Date.now() - new Date(iso)) / 1000;
  if(s < 3600)  return Math.floor(s/60) + ' นาทีที่แล้ว';
  if(s < 86400) return Math.floor(s/3600) + ' ชั่วโมงที่แล้ว';
  return Math.floor(s/86400) + ' วันที่แล้ว';
}

// ── Render cards ──
function renderCards(gridEl, chName, videos){
  gridEl.innerHTML = videos.map(v => `
    <div class="vid-card" onclick="openModal('${v.id}')">
      <div class="vid-thumb">
        <img src="${v.thumb || `https://img.youtube.com/vi/${v.id}/mqdefault.jpg`}"
             alt="${v.title}" loading="lazy">
        <div class="vid-overlay"><div class="vid-play-btn"><i class="fas fa-play"></i></div></div>
        <div class="vid-ch-badge"><i class="fab fa-youtube" style="color:#ef4444;margin-right:3px;"></i>${chName}</div>
      </div>
      <div class="vid-body">
        <div class="vid-title">${v.title}</div>
        <div class="vid-date"><i class="fas fa-clock" style="font-size:0.65rem;"></i> ${relTime(v.date)}</div>
      </div>
    </div>`).join('');
}

// ── Load one category from /api/videos ──
async function loadSection(sec){
  const root   = document.getElementById('mainContent');
  const secEl  = document.createElement('div');
  secEl.className = 'section';
  secEl.innerHTML = `
    <div class="sec-title"><i class="${sec.icon}"></i> ${sec.title}</div>
    <div class="ch-tabs" id="tabs-${sec.cat}"></div>
    <div id="grid-${sec.cat}">${skeletons()}</div>`;
  root.appendChild(secEl);

  const tabsEl = document.getElementById(`tabs-${sec.cat}`);
  const gridEl = document.getElementById(`grid-${sec.cat}`);

  try {
    // ดึงจาก /api/videos (Vercel cache 6 ชม.)
    const res  = await fetch(`/api/videos?cat=${sec.cat}`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json(); // { "Thai PBS": [...], "PPTVHD36": [...], ... }

    const chNames = Object.keys(data);
    if(!chNames.length) throw new Error('No data');

    // สร้าง tabs
    chNames.forEach((name, i) => {
      const btn = document.createElement('button');
      btn.className = 'ch-tab' + (i===0 ? ' active' : '');
      btn.textContent = name;
      btn.onclick = () => {
        tabsEl.querySelectorAll('.ch-tab').forEach((t,j) => t.classList.toggle('active', j===i));
        gridEl.style.display = 'grid';
        gridEl.style.gridTemplateColumns = 'repeat(3,1fr)';
        gridEl.style.gap = '1rem';
        renderCards(gridEl, name, data[name]);
      };
      tabsEl.appendChild(btn);
    });

    // แสดง tab แรก
    gridEl.style.display = 'grid';
    gridEl.style.gridTemplateColumns = 'repeat(3,1fr)';
    gridEl.style.gap = '1rem';
    renderCards(gridEl, chNames[0], data[chNames[0]]);

  } catch(err) {
    gridEl.innerHTML = `
      <div class="err-banner">
        <i class="fas fa-exclamation-circle"></i>
        ไม่สามารถโหลดวิดีโอได้ — ${err.message}
        ${err.message.includes('API key') || err.message.includes('500')
          ? '<br><strong>กรุณาใส่ YouTube API Key ใน /api/videos.js</strong>'
          : ''}
      </div>`;
  }
}

// ── Init ──
document.addEventListener('DOMContentLoaded', async () => {
  try{ (adsbygoogle = window.adsbygoogle || []).push({}); }catch(e){}
  // โหลดทีละ section ตามลำดับ (ไม่ให้ยิง API พร้อมกันทีเดียวหลายตัว)
  for(const sec of SECTIONS){
    await loadSection(sec);
  }
});
</script>
