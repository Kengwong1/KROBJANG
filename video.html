// ── RSS fetch via allorigins (no CORS issues) ─────────────────────────────────
function parseRSS(xml, name, kw) {
  const all = [];
  for (const p of xml.split('<entry>').slice(1)) {
    const id    = (p.match(/<yt:videoId>(.*?)<\/yt:videoId>/) ||[])[1]||'';
    const title = (p.match(/<title>(.*?)<\/title>/)           ||[])[1]||'';
    const date  = (p.match(/<published>(.*?)<\/published>/)   ||[])[1]||'';
    if (!id) continue;
    const clean = title.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'");
    all.push({id, title:clean, date, ch:name, thumb:`https://img.youtube.com/vi/${id}/mqdefault.jpg`});
  }
  if (!kw||!kw.length) return all.slice(0,10);
  const f = all.filter(v=>kw.some(k=>v.title.toLowerCase().includes(k.toLowerCase())));
  return (f.length>=2?f:all).slice(0,10);
}

async function fetchCh(ch) {
  const rss   = `https://www.youtube.com/feeds/videos.xml?channel_id=${ch.ch}`;
  const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(rss)}`;
  try {
    const r = await fetch(proxy);
    const j = await r.json();
    return parseRSS(j.contents||'', ch.name, ch.kw||null);
  } catch { return []; }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function ago(d){
  const s=Math.floor((Date.now()-new Date(d))/1000);
  if(s<60)return'เมื่อกี้';
  if(s<3600)return`${Math.floor(s/60)} นาทีที่แล้ว`;
  if(s<86400)return`${Math.floor(s/3600)} ชั่วโมงที่แล้ว`;
  if(s<2592000)return`${Math.floor(s/86400)} วันที่แล้ว`;
  return new Date(d).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'});
}

function renderVideos(channels, results){
  const wrap = document.getElementById('videoWrap');
  const html = channels.map((ch,i)=>{
    const vids = results[i];
    if(!vids||!vids.length) return '';
    return`<div class="ch-block">
      <div class="ch-header">
        <div class="ch-logo"><i class="fab fa-youtube"></i></div>
        <div>
          <div class="ch-name">${ch.name}</div>
          <div class="ch-sub">${vids.length} วิดีโอล่าสุด • อัปเดตอัตโนมัติ</div>
        </div>
      </div>
      <div class="video-grid">
        ${vids.map(v=>`
          <div class="vcard" onclick="openModal('${v.id}')">
            <div class="thumb">
              <img src="${v.thumb}" alt="${v.title}" loading="lazy">
              <div class="play-overlay"><i class="fas fa-play-circle"></i></div>
            </div>
            <div class="vinfo">
              <div class="vtitle">${v.title}</div>
              <div class="vmeta"><i class="far fa-clock"></i> ${ago(v.date)}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');
  wrap.innerHTML = html||`<div style="text-align:center;padding:3rem;color:var(--muted)">ไม่พบวิดีโอในหมวดนี้</div>`;
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(id){
  document.getElementById('modalFrame').src=`https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
  document.getElementById('modalBg').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modalFrame').src='';
  document.getElementById('modalBg').classList.remove('open');
  document.body.style.overflow='';
}
document.getElementById('modalClose').onclick=closeModal;
document.getElementById('modalBg').onclick=e=>{if(e.target===e.currentTarget)closeModal();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

// ── Load ──────────────────────────────────────────────────────────────────────
const cache={};
let cur='news';

async function loadCat(cat){
  cur=cat;
  const channels=CAT[cat];
  if(cache[cat]){renderVideos(channels,cache[cat]);return;}
  // แสดง skeleton
  document.getElementById('videoWrap').innerHTML=Array(3).fill(skelRow()).join('');
  // ดึงข้อมูลทั้งหมดพร้อมกัน
  const results=await Promise.all(channels.map(ch=>fetchCh(ch)));
  cache[cat]=results;
  if(cur===cat) renderVideos(channels,results);
}
