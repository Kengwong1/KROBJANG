<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ครบจังดอทคอม | วีดีโอ</title>
  <meta name="description" content="ดูวิดีโอข่าว บันเทิง กีฬา เทคโนโลยี การ์ตูน เกมส์ ละคร ซีรี่ส์ เพลง จากช่องดังทั่วไทย">

  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>

  <style>
    :root {
      --primary-dark: #1e3a8a;
      --primary: #1e40af;
      --primary-light: #3b82f6;
      --soft: #eff6ff;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --radius: 18px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Sarabun', sans-serif; }
    body { background: var(--bg); color: var(--text); line-height: 1.6; }

    /* Header */
    header {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: #fff; position: sticky; top: 0; z-index: 1000;
      box-shadow: 0 2px 12px rgba(30,64,175,0.3);
      display: flex; justify-content: center; align-items: center; padding: 0.75rem 1rem;
    }
    .logo { font-size: 1.5rem; font-weight: 800; text-shadow: 0 1px 2px rgba(0,0,0,0.2); }

    /* Nav */
    .main-nav { background: #fff; padding: 0.5rem 0; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .nav-wrap {
      max-width: 1200px; margin: auto;
      display: flex; gap: 0.5rem; padding: 0 1rem;
      overflow-x: auto; white-space: nowrap;
    }
    .main-nav a {
      text-decoration: none; color: #4b5563; font-weight: 600;
      padding: 0.6rem 1rem; border-radius: 12px;
      transition: all 0.2s ease;
      display: flex; align-items: center; gap: 0.4rem; font-size: 0.95rem;
    }
    .main-nav a:hover, .main-nav a.active { background: var(--soft); transform: scale(1.02); }

    /* Main Layout */
    .page-wrap {
      max-width: 1300px; margin: 0 auto; padding: 1rem 1rem;
      display: grid; grid-template-columns: 1fr 280px; gap: 1.5rem;
    }

    /* ── Category Tabs ── */
    .cat-scroll {
      overflow-x: auto; white-space: nowrap;
      padding-bottom: 0.25rem; margin-bottom: 1rem;
      scrollbar-width: none;
    }
    .cat-scroll::-webkit-scrollbar { display: none; }
    .cat-tabs { display: inline-flex; gap: 0.5rem; }
    .cat-btn {
      padding: 0.5rem 1.2rem; border-radius: 50px;
      border: 2px solid #dbeafe;
      background: #fff; color: var(--primary);
      font-weight: 700; font-size: 0.9rem;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
      display: inline-flex; align-items: center; gap: 0.4rem;
    }
    .cat-btn:hover { background: var(--soft); border-color: var(--primary-light); }
    .cat-btn.active {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: #fff; border-color: transparent;
      box-shadow: 0 4px 12px rgba(30,64,175,0.3);
    }

    /* ── Channel Row (YouTube style) ── */
    .ch-row { margin-bottom: 2rem; }
    .ch-header {
      display: flex; align-items: center; gap: 0.6rem;
      margin-bottom: 0.75rem; padding-bottom: 0.5rem;
      border-bottom: 2px solid #dbeafe;
    }
    .ch-icon { color: #FF0000; font-size: 1.3rem; }
    .ch-name { font-size: 1.1rem; font-weight: 800; color: var(--primary-dark); }
    .ch-badge {
      background: var(--soft); color: var(--primary);
      font-size: 0.75rem; font-weight: 700;
      padding: 0.15rem 0.5rem; border-radius: 50px;
      border: 1px solid #bfdbfe;
    }

    /* ── Video Grid YouTube-style ── */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.9rem;
    }

    /* First video = large (spans 2 cols, 2 rows) */
    .video-card { text-decoration: none; color: inherit; display: block; }
    .video-card:hover .thumb-img { transform: scale(1.03); }
    .video-card:hover .video-title { color: var(--primary); }

    .thumb-wrap {
      position: relative; aspect-ratio: 16/9;
      border-radius: 10px; overflow: hidden;
      background: #e2e8f0;
    }
    .thumb-img {
      width: 100%; height: 100%; object-fit: cover;
      display: block; transition: transform 0.3s;
    }
    .play-btn {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0); display: flex;
      align-items: center; justify-content: center;
      opacity: 0; transition: all 0.2s;
    }
    .video-card:hover .play-btn { opacity: 1; background: rgba(0,0,0,0.25); }
    .play-btn i { font-size: 2.8rem; color: #fff; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5)); }

    .duration-badge {
      position: absolute; bottom: 5px; right: 6px;
      background: rgba(0,0,0,0.82); color: #fff;
      font-size: 0.7rem; font-weight: 700;
      padding: 0.1rem 0.35rem; border-radius: 4px;
    }

    .video-info { padding: 0.5rem 0.25rem 0; }
    .video-title {
      font-size: 0.82rem; font-weight: 700; line-height: 1.35;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; color: var(--text); transition: color 0.2s;
    }
    .video-meta {
      font-size: 0.72rem; color: var(--muted);
      margin-top: 0.2rem; display: flex; align-items: center; gap: 0.3rem;
    }

    /* Loading */
    .loading-box {
      text-align: center; padding: 4rem 1rem; color: var(--muted);
    }
    .spinner {
      width: 42px; height: 42px; border: 4px solid #dbeafe;
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: var(--radius); padding: 1.5rem;
      text-align: center; color: #b91c1c; font-weight: 600;
    }

    /* ── Sidebar ── */
    .sidebar { display: flex; flex-direction: column; gap: 1.25rem; }
    .ad-section {
      background: var(--card); border-radius: var(--radius);
      padding: 1rem; box-shadow: 0 4px 12px rgba(30,64,175,0.04);
      text-align: center;
    }
    .ad-section h2 {
      font-size: 1.1rem; margin-bottom: 0.75rem; color: #1e293b;
      font-weight: 700; display: flex; justify-content: center; align-items: center; gap: 0.5rem;
    }
    .ad-section h2.support-site i { color: #7E57C2; }
    .ad-section h2.support-us   i { color: #FB8C00; }
    .adsense-container {
      background-color: #f9fbff; border: 1px dashed #dbeafe; border-radius: 12px;
      min-height: 250px; display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .adsense-container::before { content: "พื้นที่โฆษณา"; color: #94a3b8; font-size: 0.85rem; }
    .support-card { background: var(--card); border-radius: var(--radius); padding: 1rem; }
    .qr-code { width: 100%; max-width: 140px; height: auto; margin: 0.75rem auto; display: block; border-radius: 8px; }
    .support-links { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-top: 0.75rem; }
    .support-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
      padding: 0.55rem 0.4rem; border-radius: 10px; text-decoration: none;
      font-weight: 700; font-size: 0.82rem; color: white; transition: all 0.2s;
    }
    .support-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .support-btn.promptpay { background: #10B981; }
    .support-btn.facebook  { background: #4267B2; }
    .support-btn.youtube   { background: #FF0000; }
    .support-btn.tiktok    { background: #000; }

    /* Footer */
    footer {
      margin-top: 2rem;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: white; text-align: center; padding: 1.5rem 1rem;
    }
    footer a { color: #e0f2fe; text-decoration: none; font-weight: 600; margin: 0 0.5rem; }
    footer a:hover { text-decoration: underline; }

    /* Responsive */
    @media (max-width: 1100px) {
      .video-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 900px) {
      .page-wrap { grid-template-columns: 1fr; }
      .video-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 600px) {
      .video-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

<script>
  function timeAgo(dateStr) {
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
    if (diff < 60)      return 'เมื่อกี้';
    if (diff < 3600)    return `${Math.floor(diff/60)} นาทีที่แล้ว`;
    if (diff < 86400)   return `${Math.floor(diff/3600)} ชั่วโมงที่แล้ว`;
    if (diff < 2592000) return `${Math.floor(diff/86400)} วันที่แล้ว`;
    return new Date(dateStr).toLocaleDateString('th-TH', {day:'numeric',month:'short',year:'2-digit'});
  }

  function renderVideos(grouped) {
    const wrap = document.getElementById('videoContent');
    const entries = Object.entries(grouped).filter(([,v]) => v && v.length > 0);
    if (!entries.length) {
      wrap.innerHTML = `<div class="error-box">ไม่พบวิดีโอในหมวดนี้</div>`;
      return;
    }

    wrap.innerHTML = entries.map(([chName, videos]) => `
      <div class="ch-row">
        <div class="ch-header">
          <i class="fab fa-youtube ch-icon"></i>
          <span class="ch-name">${chName}</span>
          <span class="ch-badge">${videos.length} วิดีโอ</span>
        </div>
        <div class="video-grid">
          ${videos.map(v => `
            <a class="video-card"
               href="https://www.youtube.com/watch?v=${v.id}"
               target="_blank" rel="noopener">
              <div class="thumb-wrap">
                <img class="thumb-img" src="${v.thumb}" alt="${v.title}" loading="lazy">
                <div class="play-btn"><i class="fas fa-play-circle"></i></div>
              </div>
              <div class="video-info">
                <div class="video-title">${v.title}</div>
                <div class="video-meta">
                  <i class="far fa-clock"></i> ${timeAgo(v.date)}
                </div>
              </div>
            </a>
          `).join('')}
        </div>
      </div>
    `).join('');
  }

  async function loadCat(cat) {
    const wrap = document.getElementById('videoContent');
    wrap.innerHTML = `<div class="loading-box"><div class="spinner"></div>กำลังโหลดวิดีโอจากช่องไทย...</div>`;
    try {
      const res = await fetch(`/api/videos?cat=${cat}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      renderVideos(data);
    } catch (err) {
      wrap.innerHTML = `
        <div class="error-box">
          <i class="fas fa-exclamation-triangle"></i>
          โหลดไม่สำเร็จ: ${err.message}<br>
          <small>กรุณาตรวจสอบ YOUTUBE_API_KEY ใน Vercel Dashboard → Settings → Environment Variables</small>
        </div>`;
    }
  }

  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadCat(btn.dataset.cat);
    });
  });

  loadCat('news');
</script>
