<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ตลาดซื้อขายออนไลน์ - ครบจังดอทคอม</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  

    <header class="header-container">
        <h1>ครบจังดอทคอม</h1>
        <p>ข่าว เกม บันเทิง ไอที ไลฟ์สไตล์ ครบจบในเว็บเดียว</p>
    </header>

    <!-- จุดที่จะโหลดเมนูจาก nav.html -->
    <div id="navigation-placeholder"></div>

    <div class="container">
        <div class="ads">
        </div>
        
        <header class="marketplace-header">
            <div>ตลาดซื้อขายออนไลน์</div>
            <div id="userStatus" aria-live="polite"></div>
        </header>
        
        <nav class="category-nav" aria-label="หมวดหมู่สินค้า">
            <button class="tab-button" data-category="บ้าน">บ้าน</button>
            <button class="tab-button" data-category="รถ">รถ</button>
            <button class="tab-button" data-category="ที่ดิน">ที่ดิน</button>
            <button class="tab-button" data-category="เสื้อผ้า">เสื้อผ้า</button>
            <button class="tab-button" data-category="เครื่องประดับ">เครื่องประดับ</button>
            <button class="tab-button" data-category="เครื่องใช้ไฟฟ้า">เครื่องใช้ไฟฟ้า</button>
            <button class="tab-button" data-category="อื่นๆ">อื่นๆ</button>
            <a href="post-product.html" class="post-link">ลงประกาศขายสินค้า</a>
        </nav>
        
        <main style="margin-top: 20px;">
            <div id="productsArea" class="section">
                <p style="color:#666; text-align:center;">เลือกหมวดหมู่ด้านบนเพื่อดูสินค้า</p>
            </div>
        </main>

        <div class="ads">
        </div>
    </div>

    <footer class="footer">
        <p>© 2025 ครบจังดอทคอม | <a href="#" style="color:white; text-decoration: underline;">นโยบายความเป็นส่วนตัว</a></p>
    </footer>

    <script>
        const userStatusDiv = document.getElementById('userStatus');
        const tabButtons = document.querySelectorAll('.category-nav .tab-button');
        const productsArea = document.getElementById('productsArea');

        function updateUserStatus() {
            const user = localStorage.getItem('loggedInUser');
            if (user) {
                userStatusDiv.innerHTML = `สวัสดี, ${user} <button id="logoutBtn">ออกจากระบบ</button>`;
                document.getElementById('logoutBtn').addEventListener('click', () => {
                    if (confirm('แน่ใจจะออกจากระบบ?')) {
                        localStorage.removeItem('loggedInUser');
                        alert('ออกจากระบบเรียบร้อยแล้ว');
                        window.location.reload();
                    }
                });
            } else {
                userStatusDiv.innerHTML = `<a href="login.html" style="color:#fff;">เข้าสู่ระบบ</a>`;
            }
        }

        function showProducts(category) {
            const allPosts = JSON.parse(localStorage.getItem('salePosts')) || [];
            const filtered = allPosts.filter(p => p.category === category);

            productsArea.innerHTML = '';
            const grid = document.createElement('div');
            grid.className = 'product-grid';

            if (filtered.length === 0) {
                productsArea.innerHTML = `<p style="text-align:center; color:#666; font-style: italic;">ยังไม่มีสินค้าที่หมวด "${category}"</p>`;
                return;
            }

            filtered.forEach(post => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.tabIndex = 0;

                const img = document.createElement('img');
                img.src = post.image || 'https://via.placeholder.com/400x280?text=  ไม่มีรูปภาพ';
                img.alt = `รูปสินค้าของ ${post.title}`;
                card.appendChild(img);

                const info = document.createElement('div');
                info.className = 'product-info';

                const title = document.createElement('h3');
                title.className = 'product-title';
                title.textContent = post.title;
                info.appendChild(title);

                const desc = document.createElement('p');
                desc.className = 'product-desc';
                desc.textContent = post.description;
                info.appendChild(desc);

                const price = document.createElement('div');
                price.className = 'product-price';
                price.textContent = `${post.price.toLocaleString()} บาท`;
                info.appendChild(price);

                card.appendChild(info);

                card.addEventListener('click', () => {
                    sessionStorage.setItem('selectedProduct', JSON.stringify(post));
                    window.location.href = 'product-detail.html';
                });

                grid.appendChild(card);
            });

            productsArea.appendChild(grid);
        }

        tabButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                tabButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const selectedCategory = btn.getAttribute('data-category');
                showProducts(selectedCategory);
            });
        });

        updateUserStatus();

        // ฟังก์ชันสำหรับโหลดเมนูจาก nav.html และจัดการ active link
        async function loadNav() {
            try {
                const response = await fetch('nav.html');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const html = await response.text();
                const placeholder = document.getElementById('navigation-placeholder');
                placeholder.innerHTML = html;

                // Logic to set the active link dynamically
                const currentPage = window.location.pathname.split('/').pop() || 'index.html';
                const navLinks = placeholder.querySelectorAll('.main-nav a');

                // ลบ active class จากทุก link
                navLinks.forEach(link => link.classList.remove('active'));

                // เพิ่ม active class ให้กับ link ของหน้านี้
                navLinks.forEach(link => {
                    if (link.href.endsWith(currentPage)) {
                        link.classList.add('active');
                    }
                });

            } catch (error) {
                console.error('Error loading navigation:', error);
                document.getElementById('navigation-placeholder').innerHTML = '<p style="text-align: center; padding: 10px; color: red;">ไม่สามารถโหลดเมนูได้</p>';
            }
        }

        // เรียกใช้ฟังก์ชันโหลดเมนูเมื่อหน้าเว็บโหลดเสร็จ
        document.addEventListener("DOMContentLoaded", function () {
            loadNav();
        });
    </script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>
    <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>

  <footer>
    <p>© 2026 ครบจัง · อ่านครบ รู้จริง ใช้ได้เลย</p>
  </footer>
</body>
</html>
