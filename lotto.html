<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจหวย - ครบจังดอทคอม</title>
    <meta name="description" content="ตรวจผลสลากกินแบ่งรัฐบาลล่าสุด ย้อนหลัง 5 งวด พร้อมสถิติเลขเด็ด">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* (ใส่ CSS เดิมของคุณเก่งได้เลยค่ะ ไม่ได้มีการปรับแก้ส่วนของดีไซน์ค่ะ) */
        :root {
          --primary-dark: #1e3a8a; --primary: #1e40af; --primary-light: #3b82f6;
          --soft: #eff6ff; --bg: #f8fafc; --card: #ffffff; --text: #1e293b;
          --muted: #64748b; --radius: 18px; --highlight-red: #d32f2f; --highlight-green: #388e3c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Sarabun', sans-serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.6; }
        header { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: #fff; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: center; align-items: center; padding: 0.75rem 1rem; }
        .logo { font-size: 1.5rem; font-weight: 800; margin: 0; }
        .main-nav { background: #fff; padding: 0.5rem 0; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .nav-wrap { max-width: 1200px; margin: auto; display: flex; gap: 0.5rem; padding: 0 1rem; overflow-x: auto; white-space: nowrap; }
        .main-nav a { text-decoration: none; color: #4b5563; font-weight: 600; padding: 0.6rem 1rem; border-radius: 12px; transition: all 0.2s ease; display: flex; align-items: center; gap: 0.4rem; font-size: 0.95rem; }
        .main-nav a:hover, .main-nav a.active { background: var(--soft); transform: scale(1.02); }
        .container { max-width: 1200px; margin: 1.5rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr 300px; gap: 1.5rem; }
        .content-area { display: flex; flex-direction: column; gap: 1.5rem; }
        .section { background: var(--card); border-radius: var(--radius); padding: 1.25rem; box-shadow: 0 4px 12px rgba(30, 64, 175, 0.04); }
        .section h2 { font-size: 1.3rem; margin-bottom: 1rem; color: var(--primary); display: flex; align-items: center; gap: 0.5rem; }
        .lotto-latest { text-align: center; }
        .draw-date { font-size: 1.1em; color: var(--muted); margin-bottom: 1.25rem; }
        .prize-box { display: inline-block; background: var(--highlight-red); color: #fff; padding: 1rem 2rem; border-radius: 12px; margin-bottom: 1.25rem; }
        .prize-box .number { font-size: 2.2rem; font-weight: 800; letter-spacing: 4px; }
        .prize-summary { display: flex; justify-content: center; gap: 1rem; margin-top: 1.25rem; flex-wrap: wrap; }
        .prize-item { padding: 0.75rem 1rem; border: 1px solid #e2e8f0; border-radius: 10px; background: #f8fafc; min-width: 110px; text-align: center; }
        .prize-item .number { font-size: 1.3rem; font-weight: 700; color: var(--highlight-green); }
        .check-form { background: #f0f5ff; padding: 1.2rem; border-radius: 12px; margin: 1.5rem 0; text-align: center; }
        #userNumbers { width: 180px; padding: 0.6rem; font-size: 1.1rem; text-align: center; border: 2px solid #cbd5e1; border-radius: 10px; margin: 0.5rem auto; display: block; }
        .btn-check { background: var(--primary); color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 10px; font-weight: 700; cursor: pointer; }
        #resultMsg { margin-top: 0.75rem; font-weight: 700; }
        #resultMsg.win { color: var(--highlight-green); }
        #resultMsg.lose { color: var(--highlight-red); }
        .prize-table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.9rem; }
        .prize-table td { padding: 0.75rem; border: 1px solid #e2e8f0; text-align: center; }
        .sidebar { display: flex; flex-direction: column; gap: 1.25rem; }
        .ad-section { background: var(--card); border-radius: var(--radius); padding: 1rem; text-align: center; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <div class="logo">ครบจังดอทคอม</div>
    </header>

    <nav class="main-nav">
        <div class="nav-wrap">
            <a href="index.html"><i class="fas fa-home" style="color: #45B7D1;"></i> หน้าแรก</a>
            <a href="lotto.html" class="active"><i class="fas fa-ticket-alt" style="color: #FFD166;"></i> ตรวจหวย</a>
        </div>
    </nav>

    <div class="container">
        <div class="content-area">
            <div class="section lotto-latest">
                <h2><i class="fas fa-trophy"></i> ผลการออกรางวัลล่าสุด</h2>
                <div class="draw-date">กำลังโหลดข้อมูล...</div>

                <div class="check-form">
                    <label><i class="fas fa-search"></i> ตรวจเลขของคุณ (ใส่หลายเลขได้ คั่นด้วยช่องว่างหรือ ,)</label><br>
                    <input type="text" id="userNumbers" placeholder="เช่น 604738, 036, 471">
                    <button id="checkBtn" class="btn-check">ตรวจเลย!</button>
                    <div id="resultMsg"></div>
                </div>

                <div class="prize-box prize-1">
                    <h3>🏆 รางวัลที่ 1</h3>
                    <div class="number" id="prize1-main">กำลังโหลด...</div>
                </div>

                <div class="prize-summary">
                    <div class="prize-item">
                        <h4>เลขท้าย 2 ตัว</h4>
                        <div class="number" id="last2">...</div>
                    </div>
                    <div class="prize-item">
                        <h4>เลขท้าย 3 ตัว</h4>
                        <div class="number" id="last3">...</div>
                    </div>
                    <div class="prize-item">
                        <h4>เลขหน้า 3 ตัว</h4>
                        <div class="number" id="front3">...</div>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2><i class="fas fa-list-ol"></i> รายละเอียดทุกรางวัล</h2>
                <h3>🥈 รางวัลที่ 2 (5 รางวัล)</h3>
                <table class="prize-table table-prize-2"><tbody><tr><td>กำลังโหลด...</td></tr></tbody></table>
                
                <h3>🥉 รางวัลที่ 3 (10 รางวัล)</h3>
                <table class="prize-table table-prize-3"><tbody><tr><td>กำลังโหลด...</td></tr></tbody></table>
            </div>
        </div>
        
        <aside class="sidebar">
            <div class="ad-section">
                <h2>สนับสนุนเว็บไซต์</h2>
                </div>
        </aside>
    </div>

    <script>
        // 🔊 เสียงแจ้งเตือน
        function playWinSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const now = ctx.currentTime;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, now);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.7);
                osc.start(now); osc.stop(now + 0.7);
            } catch (e) { }
        }

        // 🛡️ ข้อมูลสำรอง (Fallback) กรณี API ล่ม ระบบจะหยิบเลขนี้มาโชว์แทนค่ะ
        const mockFallbackData = {
            date: "1 กุมภาพันธ์ 2569",
            prize1: ['604738'],
            prize2: ['158421','294856','301548','462973','581024'],
            prize3: ['025814','148520','269357','384015','495123','502476','615289','736952','847103','958214'],
            prize4: [], prize5: [],
            front3: ['295','036'],
            last3: ['471','923'],
            last2: ['85']
        };

        let lottoData = null;

        // ฟังก์ชันดึง API พร้อมระบบกันล่ม
        async function fetchLottoData() {
            try {
                const response = await fetch('https://lotto.api.rayriffy.com/lotto/latest');
                const data = await response.json();
                
                // ตรวจสอบว่า API ส่งข้อมูลมาถูกต้องจริงๆ (ป้องกัน undefined)
                if (data.status === "success" && data.response && data.response.date) {
                    const result = data.response;
                    
                    document.querySelector('.draw-date').innerHTML = `งวดประจำวันที่ <strong>${result.date}</strong>`;
                    document.getElementById('prize1-main').innerText = result.prizes[0].number[0];
                    document.getElementById('front3').innerText = result.runningNumbers[0].number.join(', ');
                    document.getElementById('last3').innerText = result.runningNumbers[1].number.join(', ');
                    document.getElementById('last2').innerText = result.runningNumbers[2].number[0];

                    lottoData = {
                        prize1: result.prizes[0].number,
                        prize2: result.prizes[1].number,
                        prize3: result.prizes[2].number,
                        prize4: result.prizes[3].number,
                        prize5: result.prizes[4].number,
                        front3: result.runningNumbers[0].number,
                        last3: result.runningNumbers[1].number,
                        last2: result.runningNumbers[2].number
                    };
                } else {
                    // ถ้า API ส่งข้อมูลพังๆ มา โยนเข้า catch เพื่อสลับไปใช้แผนสำรองทันทีค่ะ
                    throw new Error("ข้อมูล API ผิดรูปแบบ");
                }

            } catch (error) {
                console.warn("ดึง API ขัดข้อง กำลังสลับไปใช้ข้อมูลสำรอง:", error);
                useFallbackData(); // เรียกใช้แผนสำรอง
            } finally {
                // อัปเดตตารางรางวัลที่ 2 และ 3
                if(lottoData) {
                    renderPrizeTable(lottoData.prize2, 'table-prize-2');
                    renderPrizeTable(lottoData.prize3, 'table-prize-3');
                }
            }
        }

        // ฟังก์ชันสลับมาใช้ข้อมูลจำลองเวลาเว็บล่ม
        function useFallbackData() {
            // โชว์ข้อความเตือนผู้ใช้เล็กๆ ว่าระบบเชื่อมต่อขัดข้อง
            document.getElementById('resultMsg').innerHTML = '<span style="color:#eab308; font-size: 0.9em;"><i class="fas fa-exclamation-triangle"></i> ดึงผลสดขัดข้อง กำลังแสดงข้อมูลสำรองชั่วคราว</span>';
            
            document.querySelector('.draw-date').innerHTML = `งวดประจำวันที่ <strong>${mockFallbackData.date}</strong>`;
            document.getElementById('prize1-main').innerText = mockFallbackData.prize1[0];
            document.getElementById('front3').innerText = mockFallbackData.front3.join(', ');
            document.getElementById('last3').innerText = mockFallbackData.last3.join(', ');
            document.getElementById('last2').innerText = mockFallbackData.last2[0];

            lottoData = mockFallbackData;
        }

        function renderPrizeTable(numbers, tableClass) {
            const tbody = document.querySelector(`.${tableClass} tbody`);
            if(!tbody) return;
            let html = '';
            numbers.forEach(num => { html += `<tr><td>${num}</td></tr>`; });
            tbody.innerHTML = html;
        }

        fetchLottoData();

        // ฟังก์ชันตรวจหวย
        function checkLotto() {
            if (!lottoData) {
                showResult('⚠️ ข้อมูลยังโหลดไม่เสร็จ กรุณารอสักครู่ค่ะ', 'lose');
                return;
            }

            const input = document.getElementById('userNumbers').value.trim();
            if (!input) {
                showResult('⚠️ กรุณากรอกเลขหวยของคุณก่อนค่ะ', 'lose');
                return;
            }

            const rawNums = input.split(/[\s,，]+/).filter(x => x.trim());
            const userNums = rawNums.map(n => n.replace(/\D/g, '').padStart(6, '0')).filter(n => n.length === 6 && /^\d{6}$/.test(n));

            if (userNums.length === 0) {
                showResult('❌ ไม่พบเลขที่ถูกต้อง กรุณาใส่ตัวเลข 6 หลัก เช่น 604738', 'lose');
                return;
            }

            let results = [];
            let foundAny = false;

            function checkAgainst(list, label, type = 'full') {
                for (let num of userNums) {
                    if (Array.isArray(list)) {
                        for (let prize of list) {
                            let isMatch = false;
                            if (type === 'full' && num === prize) isMatch = true;
                            if (type === 'front3' && num.startsWith(prize)) isMatch = true;
                            if (type === 'last3' && num.endsWith(prize)) isMatch = true;
                            if (type === 'last2' && num.endsWith(prize)) isMatch = true;

                            if (isMatch) {
                                results.push(`<div class="match-item"><i class="fas fa-check-circle"></i> เลข <strong>${num}</strong> ถูกรางวัล <strong>${label}</strong></div>`);
                                foundAny = true;
                            }
                        }
                    }
                }
            }

            checkAgainst(lottoData.prize1, 'รางวัลที่ 1', 'full');
            checkAgainst(lottoData.prize2, 'รางวัลที่ 2', 'full');
            checkAgainst(lottoData.prize3, 'รางวัลที่ 3', 'full');
            checkAgainst(lottoData.front3, 'เลขหน้า 3 ตัว', 'front3');
            checkAgainst(lottoData.last3, 'เลขท้าย 3 ตัว', 'last3');
            checkAgainst(lottoData.last2, 'เลขท้าย 2 ตัว', 'last2');

            if (foundAny) {
                playWinSound();
                showResult(results.join(''), 'win');
            } else {
                showResult(`<div>😞 ตรวจแล้วไม่ถูกรางวัลใดเลย (เลขที่ตรวจ: ${userNums.join(', ')})</div>`, 'lose');
            }
        }

        function showResult(html, type) {
            const res = document.getElementById('resultMsg');
            res.innerHTML = html;
            res.className = type;
        }

        document.getElementById('checkBtn')?.addEventListener('click', checkLotto);
        document.getElementById('userNumbers')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkLotto();
        });
    </script>
</body>
</html>
