<!-- nav.html — แก้ที่นี่ที่เดียว อัปเดตทุกหน้าในเว็บ -->
<style>
  /* ===== RESET & BASE ===== */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ===== HEADER ===== */
  header.site-header {
    background: linear-gradient(135deg, #1a1040 0%, #2d1b69 50%, #1a1040 100%);
    padding: 0.75rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 20px rgba(106,76,147,0.4);
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  .site-logo {
    font-family: 'Sarabun', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    color: #fff;
    text-decoration: none;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .site-logo span {
    color: #FFD166;
  }

  /* ===== HAMBURGER ===== */
  .nav-toggle {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 6px;
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    border: none;
    transition: background 0.2s;
  }
  .nav-toggle:hover { background: rgba(255,255,255,0.15); }
  .nav-toggle span {
    display: block;
    width: 22px;
    height: 2px;
    background: #fff;
    border-radius: 2px;
    transition: all 0.3s ease;
    transform-origin: center;
  }
  .nav-toggle.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .nav-toggle.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .nav-toggle.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  /* ===== NAV DESKTOP ===== */
  nav.main-nav {
    background: #fff;
    border-bottom: 1px solid #ede8f5;
    box-shadow: 0 2px 8px rgba(106,76,147,0.08);
  }

  .nav-wrap {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 0.5rem;
  }

  .nav-wrap a {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.65rem 0.85rem;
    font-family: 'Sarabun', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    color: #3d2b6b;
    text-decoration: none;
    border-bottom: 3px solid transparent;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .nav-wrap a:hover {
    color: #6A4C93;
    background: #f5f0ff;
    border-bottom-color: #c4a8ff;
  }

  .nav-wrap a.active {
    color: #6A4C93;
    border-bottom-color: #6A4C93;
    background: #f5f0ff;
  }

  .nav-wrap a i {
    font-size: 0.9rem;
  }

  /* ===== MOBILE OVERLAY ===== */
  .nav-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 998;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .nav-overlay.show {
    display: block;
    opacity: 1;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .nav-toggle {
      display: flex;
    }

    nav.main-nav {
      position: fixed;
      top: 0;
      right: -280px;
      width: 280px;
      height: 100vh;
      background: #1a1040;
      z-index: 999;
      transition: right 0.3s ease;
      box-shadow: -4px 0 20px rgba(0,0,0,0.3);
      overflow-y: auto;
      padding-top: 70px;
      border-bottom: none;
    }

    nav.main-nav.open {
      right: 0;
    }

    .nav-wrap {
      flex-direction: column;
      flex-wrap: nowrap;
      padding: 0.5rem 0;
      gap: 0;
    }

    .nav-wrap a {
      color: #e0d6ff;
      padding: 0.9rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      border-left: 3px solid transparent;
      font-size: 0.95rem;
      justify-content: flex-start;
    }

    .nav-wrap a:hover,
    .nav-wrap a.active {
      background: rgba(255,255,255,0.08);
      border-left-color: #FFD166;
      border-bottom-color: rgba(255,255,255,0.06);
      color: #FFD166;
    }

    .nav-wrap a i {
      font-size: 1rem;
      width: 20px;
      text-align: center;
    }
  }
</style>

<header class="site-header">
  <a href="index.html" class="site-logo">ครบจัง<span>ดอทคอม</span></a>
  <button class="nav-toggle" id="navToggle" aria-label="เปิดเมนู">
    <span></span>
    <span></span>
    <span></span>
  </button>
</header>

<div class="nav-overlay" id="navOverlay"></div>

<nav class="main-nav" id="mainNav">
  <div class="nav-wrap">
    <a href="index.html"      data-page="index">     <i class="fas fa-home"           style="color:#45B7D1;"></i> หน้าแรก</a>
    <a href="news.html"       data-page="news">      <i class="fas fa-bolt"           style="color:#FF6B6B;"></i> ข่าวด่วน</a>
    <a href="lotto.html"      data-page="lotto">     <i class="fas fa-ticket-alt"     style="color:#FFD166;"></i> ตรวจหวย</a>
    <a href="horoscope.html"  data-page="horoscope"> <i class="fas fa-star"           style="color:#c084fc;"></i> ดูดวง</a>
    <a href="sport.html"      data-page="sport">     <i class="fas fa-futbol"         style="color:#E76F51;"></i> กีฬา</a>
    <a href="video.html"      data-page="video">     <i class="fas fa-play-circle"    style="color:#FF9F1C;"></i> วีดีโอ</a>
    <a href="ai.html"         data-page="ai">        <i class="fas fa-robot"          style="color:#2EC4B6;"></i> AI</a>
    <a href="food.html"       data-page="food">      <i class="fas fa-utensils"       style="color:#F59E0B;"></i> อาหาร</a>
    <a href="health.html"     data-page="health">    <i class="fas fa-heartbeat"      style="color:#10B981;"></i> สุขภาพ</a>
    <a href="games.html"      data-page="games">     <i class="fas fa-gamepad"        style="color:#E76F51;"></i> เกมส์</a>
    <a href="shopping.html"   data-page="shopping">  <i class="fas fa-shopping-bag"   style="color:#4ECDC4;"></i> ช้อป</a>
    <a href="booking.html"    data-page="booking">   <i class="fas fa-umbrella-beach" style="color:#45B7D1;"></i> ท่องเที่ยว</a>
    <a href="contact.html"    data-page="contact">   <i class="fas fa-headset"        style="color:#a78bfa;"></i> ติดต่อเรา</a>
  </div>
</nav>

<script>
(function() {
  var toggle = document.getElementById('navToggle');
  var nav    = document.getElementById('mainNav');
  var overlay = document.getElementById('navOverlay');

  function openMenu() {
    nav.classList.add('open');
    toggle.classList.add('open');
    overlay.classList.add('show');
    document.body.style.overflow = 'hidden';
  }
  function closeMenu() {
    nav.classList.remove('open');
    toggle.classList.remove('open');
    overlay.classList.remove('show');
    document.body.style.overflow = '';
  }

  if (toggle) toggle.addEventListener('click', function() {
    nav.classList.contains('open') ? closeMenu() : openMenu();
  });
  if (overlay) overlay.addEventListener('click', closeMenu);

  // ปิดเมนูเมื่อคลิก link (มือถือ)
  document.querySelectorAll('.nav-wrap a').forEach(function(a) {
    a.addEventListener('click', function() {
      if (window.innerWidth <= 768) closeMenu();
    });
  });
})();
</script>
