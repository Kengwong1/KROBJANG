    <style>
        :root {
          --primary-dark: #1e3a8a; --primary: #1e40af; --soft: #eff6ff;
          --bg: #f8fafc; --card: #ffffff; --text: #1e293b;
          --muted: #64748b; --radius: 18px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }

        header { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: #fff; padding: 0.75rem 1rem; position: sticky; top: 0; z-index: 1000; text-align: center; box-shadow: 0 2px 12px rgba(30, 64, 175, 0.3); }
        header h1 { font-size: 1.4rem; font-weight: 800; }

        .main-nav { background: #fff; padding: 0.5rem 0; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08); }
        .nav-wrap { max-width: 1200px; margin: auto; display: flex; gap: 0.5rem; padding: 0 1rem; overflow-x: auto; white-space: nowrap; }
        .main-nav a { text-decoration: none; color: #4b5563; font-weight: 600; padding: 0.6rem 1rem; border-radius: 12px; transition: 0.2s; display: flex; align-items: center; gap: 0.4rem; font-size: 0.95rem; }
        .main-nav a:hover, .main-nav a.active { background: var(--soft); transform: scale(1.02); }

        .container { max-width: 1200px; margin: 1.5rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr 300px; gap: 1.5rem; }
        .section { background: var(--card); border-radius: var(--radius); padding: 1.25rem; box-shadow: 0 4px 12px rgba(30, 64, 175, 0.04); margin-bottom: 1.5rem; }
        .section h2 { font-size: 1.3rem; margin-bottom: 1rem; color: var(--primary); display: flex; align-items: center; gap: 0.5rem; }
        
        /* Search Bar */
        .search-container { margin-bottom: 1rem; position: relative; }
        #newsSearch { width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem; border-radius: 12px; border: 1px solid #e2e8f0; outline: none; transition: 0.2s; }
        #newsSearch:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1); }
        .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--muted); }

        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }
        .news-card { background: var(--card); border-radius: var(--radius); overflow: hidden; text-decoration: none; color: inherit; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.25s; display: flex; flex-direction: column; border: 1px solid #f1f5f9; }
        .news-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(30, 64, 175, 0.1); }
        .news-card img { width: 100%; height: 160px; object-fit: cover; }
        .news-content { padding: 1rem; flex-grow: 1; }
        .news-content h3 { font-size: 1rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .news-content p { font-size: 0.85rem; color: var(--muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .news-date { font-size: 0.75rem; color: var(--primary); margin-top: 0.75rem; font-weight: 600; }

        .sidebar { display: flex; flex-direction: column; gap: 1.25rem; }
        .ad-section { background: var(--card); border-radius: var(--radius); padding: 1rem; text-align: center; box-shadow: 0 4px 12px rgba(30, 64, 175, 0.04); }
        .support-card { padding: 1rem; }
        .qr-code { width: 100%; max-width: 150px; margin: 0.5rem auto; display: block; border-radius: 8px; }
        .support-links { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 1rem; }
        .support-btn { padding: 0.6rem; border-radius: 8px; color: white; text-decoration: none; font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 0.3rem; }
        .facebook { background: #4267B2; } .youtube { background: #FF0000; } .tiktok { background: #000; } .promptpay { background: #10B981; }

        footer { margin-top: 2rem; background: var(--primary-dark); color: white; text-align: center; padding: 1.5rem; font-size: 0.9rem; }
        
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="content-area">
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="newsSearch" placeholder="ค้นหาหัวข้อข่าวที่คุณสนใจ...">
            </div>

            <div class="section">
                <h2><i class="fas fa-fire"></i> ข่าวด่วนยอดนิยม</h2>
                <div id="general-news" class="news-grid">กำลังดึงข้อมูลข่าว...</div>

            <div class="section">
                <h2><i class="fas fa-chart-line"></i> ข่าวเศรษฐกิจและการเงิน</h2>
                <div id="economy-news" class="news-grid">กำลังดึงข้อมูลข่าว...</div>
            </div>
        </div>

        <aside class="sidebar">
            <div class="ad-section">
                <h2 style="font-size: 1rem; color: var(--muted);">พื้นที่โฆษณา</h2>
                <div style="background:#f1f5f9; height:250px; border-radius:12px; display:flex; align-items:center; justify-content:center; border:1px dashed #cbd5e1;">

    <footer>
        <p>© 2026 ครบจังดอทคอม | ข่าวสารฉับไว เข้าใจง่าย</p>
    </footer>

    <script>
        const FEEDS = {
            general: 'https://www.prachachat.net/feed',
            economy: 'https://www.prachachat.net/economy/feed'
        };

        // ✅ ระบบ Cache ข้อมูลลง LocalStorage (โหลดไวขึ้น 10 เท่า!)
        function saveCache(key, data) {
            const cacheData = { timestamp: new Date().getTime(), items: data };
            localStorage.setItem('news_cache_' + key, JSON.stringify(cacheData));
        }

        function getCache(key) {
            const cached = localStorage.getItem('news_cache_' + key);
            if (!cached) return null;
            const data = JSON.parse(cached);
            const now = new Date().getTime();
            // ถ้าแคชยังไม่เกิน 15 นาที ให้ใช้ของเดิมได้
            if (now - data.timestamp < 15 * 60 * 1000) return data.items;
            return null;
        }

        async function loadNews(category, url) {
            const container = document.getElementById(category + '-news');
            
            // 1. ลองดึงจาก Cache ก่อน
            const cachedItems = getCache(category);
            if (cachedItems) {
                renderNews(container, cachedItems);
            }

            // 2. ดึงข้อมูลใหม่จาก API
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&api_key=oyobv0eojv0f7d5c9q7d0v0d0v0d0v0d0v0d0v0d`; // ใส่ API Key จำลอง
            
            try {
                const res = await fetch(apiUrl);
                const data = await res.json();
                if (data.status === 'ok') {
                    saveCache(category, data.items);
                    renderNews(container, data.items.slice(0, 8));
                }
            } catch (err) {
                if (!cachedItems) container.innerHTML = `<p style="padding:1rem; color:red;">❌ โหลดข่าวไม่สำเร็จ</p>`;
            }
        }

        function renderNews(container, items) {
            container.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('a');
                card.href = item.link;
                card.target = '_blank';
                card.className = 'news-card';
                
                // ระบบจัดการรูปภาพ: ถ้าไม่มีรูปให้สุ่มรูปกราฟิกสวยๆ แทนค่ะ
                const randomImg = `https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&w=400&q=80`;
                const imgUrl = item.thumbnail || randomImg;
                
                const date = new Date(item.pubDate).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2026' });

                card.innerHTML = `
                    <img src="${imgUrl}" alt="news">
                    <div class="news-content">
                        <h3>${item.title}</h3>
                        <p>${item.description.replace(/<[^>]*>/g, '').substring(0, 80)}...</p>
                        <div class="news-date"><i class="far fa-clock"></i> ${date}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // ระบบค้นหาข่าว
        document.getElementById('newsSearch').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('.news-card').forEach(card => {
                const title = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = title.includes(query) ? 'flex' : 'none';
            });
        });

        // เริ่มโหลดข่าว
        loadNews('general', FEEDS.general);
        loadNews('economy', FEEDS.economy);
    </script>
</body>
