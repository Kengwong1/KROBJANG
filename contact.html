<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ติดต่อเรา | ครบจังดอทคอม</title>
  <meta name="description" content="ติดต่อครบจังดอทคอม — ยินดีรับฟังทุกความคิดเห็น แนะนำ หรือโฆษณา">
  <link rel="canonical" href="https://krobjang.vercel.app/contact.html">
  <meta property="og:title" content="ติดต่อเรา | ครบจังดอทคอม">
  <meta property="og:description" content="ติดต่อครบจังดอทคอม — ยินดีรับฟังทุกความคิดเห็น แนะนำ หรือโฆษณา">
  <meta property="og:url" content="https://krobjang.vercel.app/contact.html">
  <meta property="og:site_name" content="ครบจังดอทคอม">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<script src="nav.js"></script>
<div class="container">
  <div class="content-area" style="max-width:600px;margin:0 auto;">

    <h1 style="color:var(--primary,#1e40af);font-size:1.4rem;margin-bottom:0.25rem;">
      <i class="fas fa-headset"></i> ติดต่อเรา
    </h1>
    <p style="color:var(--muted,#64748b);margin-bottom:1.75rem;font-size:0.95rem;">
      ยินดีรับฟังทุกความคิดเห็น แนะนำ หรือโฆษณาได้เลยครับ
    </p>

    <!-- Facebook -->
    <a href="https://www.facebook.com/krubjang" target="_blank" rel="noopener"
       style="display:flex;align-items:center;gap:1rem;padding:1rem 1.25rem;
              background:#1877F2;color:#fff;border-radius:12px;
              text-decoration:none;font-weight:700;font-size:1rem;
              margin-bottom:0.85rem;transition:opacity 0.18s;"
       onmouseover="this.style.opacity='0.88'" onmouseout="this.style.opacity='1'">
      <i class="fab fa-facebook-f" style="font-size:1.3rem;width:24px;text-align:center;"></i>
      <span>Facebook</span>
      <i class="fas fa-arrow-right" style="margin-left:auto;font-size:0.8rem;opacity:0.75;"></i>
    </a>

    <!-- YouTube -->
    <a href="https://www.youtube.com/@krubjang" target="_blank" rel="noopener"
       style="display:flex;align-items:center;gap:1rem;padding:1rem 1.25rem;
              background:#FF0000;color:#fff;border-radius:12px;
              text-decoration:none;font-weight:700;font-size:1rem;
              margin-bottom:0.85rem;transition:opacity 0.18s;"
       onmouseover="this.style.opacity='0.88'" onmouseout="this.style.opacity='1'">
      <i class="fab fa-youtube" style="font-size:1.3rem;width:24px;text-align:center;"></i>
      <span>YouTube</span>
      <i class="fas fa-arrow-right" style="margin-left:auto;font-size:0.8rem;opacity:0.75;"></i>
    </a>

    <!-- TikTok — ใช้ icon Font Awesome เท่านั้น ไม่ใช้โลโก้สี/รูปโลโก้จริง -->
    <a href="https://www.tiktok.com/@krubjang" target="_blank" rel="noopener"
       style="display:flex;align-items:center;gap:1rem;padding:1rem 1.25rem;
              background:#111;color:#fff;border-radius:12px;
              text-decoration:none;font-weight:700;font-size:1rem;
              margin-bottom:0.85rem;transition:opacity 0.18s;"
       onmouseover="this.style.opacity='0.82'" onmouseout="this.style.opacity='1'">
      <i class="fab fa-tiktok" style="font-size:1.3rem;width:24px;text-align:center;"></i>
      <span>TikTok</span>
      <i class="fas fa-arrow-right" style="margin-left:auto;font-size:0.8rem;opacity:0.75;"></i>
    </a>

    <!-- Email (optional — ง่ายต่อการติดต่อโดยตรง) -->
    <a href="mailto:contact@krubjang.com"
       style="display:flex;align-items:center;gap:1rem;padding:1rem 1.25rem;
              background:var(--card,#fff);color:var(--primary,#1e40af);border-radius:12px;
              text-decoration:none;font-weight:700;font-size:1rem;
              border:1.5px solid var(--border,#e2e8f0);transition:box-shadow 0.18s;"
       onmouseover="this.style.boxShadow='0 2px 12px rgba(0,0,0,0.08)'"
       onmouseout="this.style.boxShadow='none'">
      <i class="fas fa-envelope" style="font-size:1.3rem;width:24px;text-align:center;color:var(--primary,#1e40af);"></i>
      <span>อีเมล</span>
      <i class="fas fa-arrow-right" style="margin-left:auto;font-size:0.8rem;opacity:0.5;"></i>
    </a>

  </div>
</div>
</body>
</html>
